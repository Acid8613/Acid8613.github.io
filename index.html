<!DOCTYPE html>
<html>

<head>

<title>Acid Aviation Photography</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:28px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
display:block;
}

.info{
padding:15px;
}

</style>

</head>

<body>

<header>
✈️ Acid Aviation Photography
</header>

<div class="gallery">

<div class="card">
<img src="photos/plane1.JPG">
<div class="info">
Boeing 787-9<br>
Cathay Pacific<br>
Xiamen Gaoqi Airport
</div>
</div>

<div class="card">
<img src="photos/plane2.JPG">
<div class="info">
Airbus A350-900<br>
Xiamen Airlines<br>
Xiamen Gaoqi Airport
</div>
</div>

<div class="card">
<img src="photos/plane3.JPG">
<div class="info">
Boeing 777-300ER<br>
Cathay Pacific<br>
Hong Kong Airport
</div>
</div>

</div>

</body>
</html>
