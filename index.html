<!DOCTYPE html>
<html>

<head>

<title>Acid Aviation Photography</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1120;
color:white;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
display:block;
}

.info{
padding:15px;
font-size:14px;
}

</style>

</head>

<body>

<header>
✈️ Acid Aviation Photography
</header>

<div class="gallery">

<div class="card">
<img src="photo1.jpg">
<div class="info">
Boeing 787-9<br>
Cathay Pacific<br>
Xiamen Gaoqi Airport
</div>
</div>

<div class="card">
<img src="photo2.jpg">
<div class="info">
Airbus A350-900<br>
Xiamen Airlines<br>
Xiamen Gaoqi Airport
</div>
</div>

<div class="card">
<img src="photo3.jpg">
<div class="info">
Boeing 777-300ER<br>
Cathay Pacific<br>
Hong Kong Airport
</div>
</div>

</div>

</body>

</html>
